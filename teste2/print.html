<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cor-interna: #333333aa;
            --cor-externa: #000000aa;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        .swiper {
            width: 75%;

            & .swiper-wrapper {
                & .swiper-slide {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    justify-content: center;
                    aspect-ratio: 16/9;
                    background-image: radial-gradient( var(--cor-interna), var(--cor-externa));
                    backdrop-filter: blur(10px);
                    border-radius: 30px;
                    border: 5px solid #111;
                    box-shadow: 0px 0px 0px 0px #1110,
                    inset 0px 0px 0px 0px #1110;
                    transition: box-shadow .5s;


                    & div {
                        height: 100%;
                        width: auto;
                        border: 1px solid #fff1;
                        
                        & img {
                            height: 100%;
                            width: auto;
                            opacity: 0;
                        }
                    }

                    & .swiper-descricao {
                        position: absolute;
                        top: 0;
                        left: 0;
                        background-color: #111;
                        padding: 15px;
                        color: #fff;
                        box-shadow: 0px 0px 0px 0px #1110,
                            0px 0px 0px 0px #1110;
                        border-bottom-right-radius: 20px;
                        opacity: 0;
                        transition-duration: .5s;
                    }
                }
            }
        }

        .swiper-pagination,
        .swiper-button-prev,
        .swiper-button-next,
        .swiper-button-disabled {
            z-index: 20 !important;
            opacity: 0;
            transition-duration: .5s;
        }

        .swiper-button-prev,
        .swiper-button-next {
            color: #fff !important;
            transition-duration: .5s;

            &:hover {
                transform: scale(1.1);
                filter: drop-shadow(0px 0px 10px #fff);
            }
        }

        .swiper-pagination-bullet {
            background-color: #fff;
            transition-duration: .5s;
            margin: 0 5px;
            opacity: .5;

            &:hover {
                transform: scale(1.5);
                box-shadow: 0px 0px 10px 0px #fff;
            }
        }

        .swiper-pagination-bullet-active {
            background-color: #fff;
            transform: scale(1.5);
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div><img src="images/0.webp" alt=""></div>
            </div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
            <div class="swiper-slide"></div>
        </div>

        <div class="swiper-pagination"></div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".swiper", {
            effect: "cards",
            cardsEffect: {
                perSlideOffset: 10,
                perSlideRotate: 2,
                rotate: true,
                slideShadows: true,
            },
            mousewheel: {
                invert: false,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        })
        document.querySelector(".swiper-button-disabled").style.opacity = 0
    </script>

</body>

</html>
