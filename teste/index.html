<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-color: #555;
        }

        .swiper {
            width: 100%;
            padding: 50px 0;
        }

        .swiper-slide {
            position: relative;
            width: 1000px;
            aspect-ratio: 16/9;
            border-radius: 14px;

            & img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }

        .swiper-pagination-bullet-active {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="images/2.png" alt=""></div>
            <div class="swiper-slide"><img src="images/224.png" alt=""></div>
            <div class="swiper-slide"><img src="images/431.png" alt=""></div>
            <div class="swiper-slide"><img src="images/440.png" alt=""></div>
            <div class="swiper-slide"><img src="images/441.png" alt=""></div>
            <div class="swiper-slide"><img src="images/487.png" alt=""></div>
            <div class="swiper-slide"><img src="images/525.png" alt=""></div>
            <div class="swiper-slide"><img src="images/5NAF.png" alt=""></div>
            <div class="swiper-slide"><img src="images/Cam1B_freddy.png" alt=""></div>
            <div class="swiper-slide"><img src="images/Cam7_freddy.png" alt=""></div>
            <div class="swiper-slide"><img src="images/Freddy_Staring.jpg" alt=""></div>
            <div class="swiper-slide"><img src="images/FreddyCAM4B.png" alt=""></div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".swiper", {
            effect: "coverflow",
            grabCursor: false,
            centeredSlides: true,
            initialSlide: 0,
            speed: 600,
            preventClicks: true,
            slidesPerView: "auto",
            coverflowEffect: {
                rotate: 0,
                stretch: 80,
                depth: 350,
                modifier: 1,
                slideShadows: true,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true, // Permite clicar nas bolinhas de paginação
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            on: {
                click(event) {
                    swiper.slideTo(this.clickedIndex)
                },
            },
        });
    </script>

</body>

</html>
